# ============================================================
# FastAPI CI/CD 流水线
# ============================================================
# 触发条件：
#   1. push 到 main 分支（执行 Lint + Test + Build + Deploy）
#   2. push tag（如 v1.0.0，执行 Build + Deploy，使用 tag 作为版本号）
#   3. Pull Request（仅执行 Lint + Test）
# ============================================================

name: CI/CD Pipeline

# ──────────────────────────────────────
# 触发条件
# ──────────────────────────────────────
on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # 匹配 v1.0.0, v2.1.3 等
  pull_request:
    branches:
      - main

# ──────────────────────────────────────
# 全局环境变量
# ──────────────────────────────────────
env:
  DOCKER_REGISTRY: ghcr.io                  # GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }}     # 镜像名 = 用户名/仓库名
  PYTHON_VERSION: '3.10'

# ──────────────────────────────────────
# 权限
# ──────────────────────────────────────
permissions:
  contents: read
  packages: write
  security-events: write

# ============================================================
# Jobs
# ============================================================
jobs:

  # ──────────────────────────────────────
  # Job 1: Lint（代码规范检查）
  # ──────────────────────────────────────
  lint:
    name:  Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name: 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # 学习点 1：在一个 Step 里安装多个依赖
      #    把多个 pip install 命令放在同一个 run 块里
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: 运行 flake8 检查
        run: |
          echo "========================================="
          echo "  Flake8 代码规范检查"
          echo "========================================="
          flake8 app/ tests/ \
            --statistics \
            --count \
            --show-source
          echo "代码规范检查通过！"

  # ──────────────────────────────────────
  # Job 2: Test（单元测试 + 覆盖率）
  # ──────────────────────────────────────
  test:
    name:  Test
    runs-on: ubuntu-24.04
    needs: lint                        # 依赖 lint 通过后才执行

    steps:
      - name:  Checkout 代码
        uses: actions/checkout@v6

      - name: 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 pytest
        run: |
          echo "========================================="
          echo "  Pytest 单元测试 + 覆盖率报告"
          echo "========================================="
          pytest

      #  学习点 2：上传 pytest 测试报告
      #    使用 actions/upload-artifact 保留生成的报告文件
      - name:  上传测试结果 (JUnit XML)
        if: always()                    # 即使测试失败也要上传
        uses: actions/upload-artifact@v7
        with:
          name: test-results-junit
          path: test-results.xml
          retention-days: 30

      - name:  上传覆盖率报告 (HTML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-report
          path: coverage_html/
          retention-days: 30

      - name:  上传覆盖率报告 (XML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-report
          path: coverage.xml
          retention-days: 30

      #  学习点 2（补充）：在 PR 中显示覆盖率注释
      - name: 发布覆盖率到 PR 评论
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: coverage.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────
  # Job 3: Build（构建 Docker 镜像）
  # ──────────────────────────────────────
  build:
    name:  Build Image
    runs-on: ubuntu-24.04
    needs: test                        # 依赖测试通过后才构建

    # 只有 push（非 PR）才构建
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name:  登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #  学习点 3：自动根据 Git Tag / SHA 生成 Docker 镜像标签
      - name:  生成镜像标签元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 如果是 tag 推送：v1.0.0 → 1.0.0, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 如果是 branch 推送：main → sha-xxxxxx
            type=sha,prefix=
            # 始终添加 latest 标签（仅 main 分支）
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name:  设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name:  构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha           # 使用 GitHub Actions 缓存加速构建
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name:  输出镜像信息
        run: |
          echo "========================================="
          echo "  镜像构建成功！"
          echo "========================================="
          echo "标签: ${{ steps.meta.outputs.tags }}"
          echo "标签 JSON:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo ""
          echo "拉取命令："
          echo "  docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

